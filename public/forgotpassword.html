<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="reset.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="reset-overlay">
        <h1>Reset your Password</h1>
        <p>Insert your identifier to reset your password</p>
        <form id="resetForm" method="post" action="/login">

        <h4>Insert Your identifier</h4>
        <input name="email" id="email" type="text" placeholder="yourname or No Name" required><br>
        <h4>Email (Optional)</h4>
        <input name="email" id="email" type="email" placeholder="actualuser@gmail.com"><br>
        <br>
        <input type="submit" value="Reset" id="resetBtn">
        <br>
        <br>
        <a href="/login">Log in to your Account</a>
        </form>
    </div>
</body>
</html>

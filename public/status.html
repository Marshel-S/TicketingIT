<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Status Pengiriman</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
    }
    .success { color: green; }
    .error { color: red; }
    button {
      margin-top: 20px;
      padding: 10px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title"></h2>
  <p id="message"></p>

  <button onclick="goList()">Lihat Data</button>
  <button onclick="goForm()">Kembali ke Form</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const status = params.get("status");

  const title = document.getElementById("title");
  const message = document.getElementById("message");

  if (status === "success") {
    title.textContent = "Berhasil!";
    title.className = "success";
    message.textContent = "Data berhasil disimpan ke database.";
  } else {
    title.textContent = "Gagal!";
    title.className = "error";
    message.textContent = "Terjadi kesalahan saat menyimpan data.";
  }

  function goList() {
    window.location.href = "/list.html";
  }

  function goForm() {
    window.location.href = "/index.html";
  }
</script>

</body>
</html>
